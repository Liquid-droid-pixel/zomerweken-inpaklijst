<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Randmeren Inpaklijst — Premium packing checklist for Zomerweken">
  <title>Randmeren Inpaklijst — Zomerweken</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
</head>
<body>

  <!-- ─── Sidebar Navigation ───────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">⚓</div>
        <div class="logo-text">
          <span class="logo-title">Randmeren</span>
          <span class="logo-subtitle">Inpaklijst · Zomerweken</span>
        </div>
      </div>
    </div>

    <div id="sidebar-nav" role="list"></div>

    <div class="sidebar-footer">
      <div class="sidebar-stat" id="sidebar-overall-stat">
        <!-- Filled by JS -->
      </div>
    </div>
  </nav>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ─── Main Wrapper ─────────────────────────────────────────────────── -->
  <div class="main-wrapper">

    <!-- Top Header -->
    <header class="top-header" role="banner">
      <div class="header-left">
        <button class="icon-btn" id="mobile-menu-btn" aria-label="Open menu" aria-expanded="false">
          <!-- ICONS.menu rendered by JS -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span id="header-page-title">Dashboard</span>
      </div>

      <div class="header-search" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="global-search" placeholder="Search items… (Ctrl+/)"
          aria-label="Search all checklist items">
      </div>

      <div class="header-actions">
        <span id="sync-status" title="Firebase sync status" style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-right:4px">↻ Connecting…</span>
        <span id="autosave-indicator" title="Auto-saved" aria-label="Auto-saved">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
          </svg>
          Saved
        </span>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content" role="main" aria-live="polite">
      <!-- Pages rendered here by JS -->
    </main>
  </div>

  <!-- ─── Mobile Bottom Navigation ────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Bottom navigation"></nav>

  <!-- ─── Notes Modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true"
    aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-header-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </span>
          <div>
            <div class="modal-title-label">Note for</div>
            <div id="modal-title"></div>
          </div>
        </div>
        <button class="modal-close-btn" id="modal-close" aria-label="Close note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <textarea id="modal-textarea" placeholder="Write a note… (e.g. still drying, packed in blue bag)"
        aria-label="Note text" maxlength="500"></textarea>

      <div class="modal-char-row">
        <span id="modal-char-count">0 / 500</span>
      </div>

      <div class="modal-actions">
        <button class="btn-ghost" id="modal-delete" aria-label="Delete note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Delete
        </button>
        <button class="btn-primary" id="modal-save" aria-label="Save note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Save Note
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Floating Action Button ───────────────────────────────────────── -->
  <div class="fab-container" aria-label="Quick actions">
    <div class="fab-menu" id="fab-menu">
      <button class="fab-item" id="fab-home" aria-label="Go to dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Dashboard
      </button>
      <button class="fab-item" id="fab-undo" aria-label="Undo last action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
        </svg>
        Undo (Ctrl+Z)
      </button>
      <button class="fab-item" id="fab-export" aria-label="Export JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export JSON
      </button>
    </div>
    <button id="fab-btn" aria-label="Quick actions" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- ─── Sticky Progress Widget ───────────────────────────────────────── -->
  <div id="progress-widget" aria-label="Overall packing progress">
    <div class="widget-text">
      <div class="widget-label">Overall Progress</div>
      <div class="widget-bar">
        <div class="widget-fill" id="widget-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="widget-pct">0%</div>
  </div>

  <!-- ─── Toast Container ──────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- ─── Confetti Canvas ──────────────────────────────────────────────── -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <!-- ─── Scripts ──────────────────────────────────────────────────────── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/checklist.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
